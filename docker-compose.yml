services:
  postgres-app:
    image: postgres:17-alpine
    container_name: ops-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ecommerce
    ports:
      - "5431:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ops-network
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - ops-network
  mcp-operations:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile
    container_name: mcp-operations
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${APP_POSTGRES_PASSWORD:-postgres}@postgres-app:5432/ecommerce
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-app:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('localhost',8001),2); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ops-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ops-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${APP_POSTGRES_PASSWORD:-postgres}@postgres-app:5432/ecommerce
      QDRANT_URL: http://qdrant:6333
      DIAL_API_KEY: ${DIAL_API_KEY}
      DIAL_ENDPOINT: ${DIAL_ENDPOINT}
      DIAL_API_VERSION: ${DIAL_API_VERSION}
      DIAL_DEPLOYMENT: ${DIAL_DEPLOYMENT}
      USE_MCP_TOOLS: ${USE_MCP_TOOLS:-all}
      MCP_URL: http://mcp-operations:8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEED_DB: ${SEED_DB:-false}
      # Langfuse tracing
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-local}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-local}
      LANGFUSE_BASE_URL: http://langfuse-web:3000
    depends_on:
      postgres-app:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mcp-operations:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ops-network
      - langfuse-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ops-frontend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ops-network

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse
    restart: always
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?Set LANGFUSE_NEXTAUTH_SECRET in .env}
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD:?Set LANGFUSE_POSTGRES_PASSWORD in .env}@postgres-langfuse:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3000}
      SALT: ${LANGFUSE_SALT:?Set LANGFUSE_SALT in .env}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Set LANGFUSE_ENCRYPTION_KEY in .env}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD in .env}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ""
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_INIT_ORG_ID: ecommerce-org
      LANGFUSE_INIT_ORG_NAME: ECommerce Org
      LANGFUSE_INIT_PROJECT_ID: ecommerce-operations
      LANGFUSE_INIT_PROJECT_NAME: Ecommerce Operations
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?Set LANGFUSE_INIT_USER_PASSWORD in .env}
    networks:
      - langfuse-network

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    restart: always
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD:?Set LANGFUSE_POSTGRES_PASSWORD in .env}@postgres-langfuse:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3000}
      SALT: ${LANGFUSE_SALT:?Set LANGFUSE_SALT in .env}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Set LANGFUSE_ENCRYPTION_KEY in .env}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD in .env}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ""
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
    networks:
      - langfuse-network

  postgres-langfuse:
    image: postgres:15
    container_name: langfuse-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:?Set LANGFUSE_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: langfuse
    volumes:
      - postgres_langfuse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - langfuse-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: langfuse-clickhouse
    restart: always
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD in .env}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - langfuse-network

  minio:
    image: minio/minio
    container_name: langfuse-minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - langfuse-network

  redis:
    image: redis:7
    container_name: langfuse-redis
    restart: always
    networks:
      - langfuse-network

networks:
  ops-network:
    driver: bridge
  langfuse-network:
    driver: bridge

volumes:
  postgres_app_data:
  postgres_langfuse_data:
  clickhouse_data:
  minio_data:
  qdrant_data:
